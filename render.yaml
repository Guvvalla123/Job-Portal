# Render Blueprint — adjust names/regions and paste into Render Dashboard → Blueprints, or use `render blueprint apply`.
# Docs: https://render.com/docs/blueprint-spec
#
# Prerequisites: MongoDB Atlas URI, Cloudinary, JWT secrets, CLIENT_URL = your Vercel origin.
# For contractual email / job alerts: set REDIS_URL on ALL three services below (web + both workers). Workers are NOT optional if you rely on the queue.

services:
  - type: web
    name: job-portal-api
    runtime: node
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: npm ci
    startCommand: node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: TRUST_PROXY_HOPS
        value: "1"
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_RELEASE
        sync: false

  - type: worker
    name: job-portal-email-worker
    runtime: node
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm run worker:email
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

  - type: worker
    name: job-portal-job-alert-digest-worker
    runtime: node
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm run worker:job-alert-digest
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
