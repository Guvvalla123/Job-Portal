# Netlify configuration for Job Portal frontend
# Deploy from project root: netlify deploy --prod
# Or set base to "frontend" in Netlify UI if deploying from repo root

[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# SPA fallback - all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
